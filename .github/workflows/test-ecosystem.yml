name: CI - Testing Ecosystem

on:
  push:
    branches: [ "main", "test-ecosystem-setup" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Small & Medium Tests (Vitest)
      run: npx vitest run

    - name: Run Linter
      run: npm run lint

    - name: Type Checking
      run: npx tsc --noEmit

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run E2E Tests - Batch 1 (Auth & Clients)
      run: npx playwright test tests/e2e/auth.spec.ts tests/e2e/clients.spec.ts --project=chromium
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        CRON_SECRET: ${{ secrets.CRON_SECRET }}

    - name: Delay to prevent Rate Limiting
      run: sleep 10

    - name: Run E2E Tests - Batch 2 (Security & Invoices)
      run: npx playwright test tests/e2e/v2.5-advanced-security.spec.ts tests/e2e/invoices_lifecycle.spec.ts --project=chromium
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        CRON_SECRET: ${{ secrets.CRON_SECRET }}

    - name: Delay to prevent Rate Limiting
      run: sleep 10

    - name: Run E2E Tests - Batch 3 (Trash, AI, & Theme)
      run: npx playwright test tests/e2e/trash_recovery.spec.ts tests/e2e/nvidia_test.spec.ts tests/e2e/theme_screenshot.spec.ts --project=chromium
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        CRON_SECRET: ${{ secrets.CRON_SECRET }}
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
        AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        AI_MODEL_NAME: ${{ secrets.AI_MODEL_NAME }}

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
