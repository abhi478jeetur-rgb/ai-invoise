name: CI - Testing Ecosystem

on:
  push:
    branches: [ "main", "test-ecosystem-setup" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Small & Medium Tests (Vitest)
      run: npx vitest run

    - name: Run Linter
      run: npm run lint

    - name: Type Checking
      run: npx tsc --noEmit

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Flow Tests (Playwright E2E)
      run: npx playwright test tests/e2e/ --project=chromium
      env:
        # Pass necessary environment variables for your DB and tests
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        CRON_SECRET: ${{ secrets.CRON_SECRET }}

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
